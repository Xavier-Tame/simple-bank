name: Deploy to GitHub Container Registry

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: xavier-tame/simple-bank

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Generate app.env from Doppler
        run: doppler secrets download --no-file --format env-no-quotes > app.env
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PROD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v5

      - name: Set up kubectl
        uses: tale/kubectl-action@v1
        with:
          base64-kube-config: ${{ secrets.KUBE_CONFIG }}
          kubectl-version: v1.34.1

      - name: Apply all K8s manifests
        run: kubectl apply -f k8s/

      - name: Update image to latest tag
        run: |
          kubectl set image deployment/simple-bank-api \
            simple-bank-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Force image pull (rollout restart)
        run: kubectl rollout restart deployment/simple-bank-api

      - name: Watch rollout progress
        run: |
          kubectl rollout status deployment/simple-bank-api

      - name: Wait for rollout to complete
        run: kubectl rollout status deployment/simple-bank-api
