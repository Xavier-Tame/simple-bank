apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: simple-bank-api-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: simple-bank-api
  minReplicas: 2 # minimum pods always running
  maxReplicas: 4 # maximum pods allowed to scale up to
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70 # scale up when CPU hits 70%
